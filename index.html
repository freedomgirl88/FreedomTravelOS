<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#5b7cfa" />
    <link rel="manifest" href="/FreedomTravelOS/manifest.webmanifest?v=3" />
    <title>Freedom Travel OS</title>
    <script type="module" crossorigin src="/FreedomTravelOS/assets/index-BHAz7_gx.js"></script>
    <link rel="stylesheet" crossorigin href="/FreedomTravelOS/assets/index-B6EPI0uy.css">
  </head>
  <body>
    <div id="root"></div>
    <script>
      (function() {
        if (!('serviceWorker' in navigator)) {
          console.log('Service workers not supported');
          return;
        }

        window.addEventListener('load', function() {
          navigator.serviceWorker.register('/FreedomTravelOS/sw.js?v=3', {
            scope: '/FreedomTravelOS/'
          }).then(registration => {
            console.log('✓ Service Worker registered', registration);
            registration.onupdatefound = () => {
              console.log('Service Worker update found');
            };
          }).catch(error => {
            console.error('✗ Service Worker registration failed:', error);
          });
        });
      })();
    </script>
  </body>
</html>
