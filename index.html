<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#07162c" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Freedom" />
    <link rel="apple-touch-icon" href="/FreedomTravelOS/icons/apple-touch-icon.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/FreedomTravelOS/icons/icon-192.png" />
    <link rel="manifest" href="/FreedomTravelOS/manifest.webmanifest?v=7" />
    <title>Freedom Travel OS</title>
    <script type="module" crossorigin src="/FreedomTravelOS/assets/index-Dt3Da3m9.js"></script>
    <link rel="stylesheet" crossorigin href="/FreedomTravelOS/assets/index-C4-5l_D2.css">
  </head>
  <body>
    <div id="root"></div>
    <script>
      (function() {
        if (!('serviceWorker' in navigator)) {
          console.log('Service workers not supported');
          return;
        }

        window.addEventListener('load', function() {
          navigator.serviceWorker.register('/FreedomTravelOS/sw.js?v=7', {
            scope: '/FreedomTravelOS/'
          }).then(registration => {
            console.log('✓ Service Worker registered', registration);
            registration.onupdatefound = () => {
              console.log('Service Worker update found');
            };
          }).catch(error => {
            console.error('✗ Service Worker registration failed:', error);
          });
        });
      })();
    </script>
  </body>
</html>
